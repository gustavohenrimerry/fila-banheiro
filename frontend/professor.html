<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Professor</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Logout fixo canto superior direito */
    #logoutContainer {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f3f4f6;
      padding: 6px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      z-index: 1000;
      font-family: sans-serif;
    }
    #logoutContainer span {
      font-weight: bold;
      color: #111827;
    }
    #logoutContainer button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    /* Login centralizado */
    .loginBox input {
      width: 200px;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .loginBox button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #5b3df5;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    /* Botão cooldown fixo canto inferior direito */
    .cooldownMenu {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
    .cooldownBotao {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .cooldownLista {
      display: none;
      margin-top: 10px;
      background: #f3f4f6;
      padding: 10px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* Fila e lista de alunos */
    #fila .aluno, #listaAlunos .aluno {
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      border-radius: 6px;
      font-family: sans-serif;
    }

    #fila .aluno button, #listaAlunos .aluno button {
      cursor: pointer;
    }

    .posicao {
      font-weight: bold;
    }

    #primeiro .primeiroAluno {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <!-- LOGOUT / USUÁRIO -->
  <div id="logoutContainer" style="display:none;">
    <span id="usuarioLogado"></span>
    <button onclick="logout()">Sair</button>
  </div>

  <!-- LOGIN -->
  <div id="login" class="loginContainer">
    <div class="loginBox">
      <h1>Painel Professor</h1>
      <input id="usuario" type="text" placeholder="Usuário" />
      <input id="senha" type="password" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- PAINEL -->
  <div id="painel" style="display:none; padding:20px;">

    <!-- TOPO -->
    <div class="topo">
      <h1>Controle Banheiro</h1>
      <div id="contador">0 alunos</div>
    </div>

    <!-- BOTÕES -->
    <div class="acoes">
      <button onclick="proximoAluno()">Avisar Aluno</button>
      <button onclick="alunoVoltou()">Aluno Voltou</button>
      <button onclick="abrirLista()">☰</button>
    </div>

    <!-- PRIMEIRO -->
    <div id="primeiro"></div>

    <!-- FILA -->
    <div id="fila"></div>

    <!-- MENU ALUNOS -->
    <div id="menuAlunos" class="menuAlunos" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h2>Adicionar aluno</h2>
        <button onclick="fecharLista()" style="width:40px;height:40px;border:none;border-radius:50%;background:#5b3df5;color:white;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div id="listaAlunos"></div>
    </div>

    <!-- CONTADOR -->
    <div class="contadorTitulo">
      <h2>Vezes no banheiro</h2>
    </div>
    <div id="contadorBanheiro"></div>

    <!-- COOLDOWNS -->
    <div class="cooldownMenu">
      <button class="cooldownBotao" onclick="abrirCooldowns()">⏰</button>
      <div id="cooldownLista" class="cooldownLista">
        <h3>Cooldown</h3>
        <div id="cooldowns"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="professor.js"></script>
</body>
</html>
