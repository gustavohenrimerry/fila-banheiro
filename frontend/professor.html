<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Professor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGOUT / USUÁRIO -->
  <div id="logoutContainer" style="display:none; justify-content:flex-end; align-items:center; padding:10px;">
    <span id="usuarioLogado" style="margin-right:15px;"></span>
    <button onclick="logout()" style="padding:6px 12px; border:none; border-radius:6px; background:#ef4444; color:white; cursor:pointer;">Sair</button>
  </div>

  <!-- LOGIN -->
  <div id="login" class="loginContainer">
    <div class="loginBox">
      <h1>Painel Professor</h1>
      <input id="usuario" type="text" placeholder="Usuário" />
      <input id="senha" type="password" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- PAINEL -->
  <div id="painel" style="display:none;">

    <div class="topo">
      <h1>Controle Banheiro</h1>
      <div id="contador">0 alunos</div>
    </div>

    <!-- BOTÕES -->
    <div class="acoes">
      <button onclick="proximoAluno()">Avisar Aluno</button>
      <button onclick="alunoVoltou()">Aluno Voltou</button>
      <button onclick="abrirLista()">☰</button>
    </div>

    <!-- PRIMEIRO -->
    <div id="primeiro"></div>

    <!-- FILA -->
    <div id="fila"></div>

    <!-- MENU ALUNOS -->
    <div id="menuAlunos" class="menuAlunos" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h2>Adicionar aluno</h2>
        <button onclick="fecharLista()" style="width:40px;height:40px;border:none;border-radius:50%;background:#5b3df5;color:white;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div id="listaAlunos"></div>
    </div>

    <!-- CONTADOR -->
    <div class="contadorTitulo">
      <h2>Vezes no banheiro</h2>
    </div>
    <div id="contadorBanheiro"></div>

    <!-- BOTÃO COOLDOWN FIXO (bolinha canto inferior direito) -->
    <div class="cooldownMenu" style="position:fixed; bottom:20px; right:20px; z-index:1000;">
      <button class="cooldownBotao" onclick="abrirCooldowns()" style="width:50px; height:50px; border-radius:50%; border:none; background:#facc15; color:#000; font-size:24px; cursor:pointer;">⏰</button>
      <div id="cooldownLista" class="cooldownLista" style="display:none; position:absolute; bottom:60px; right:0; background:white; padding:10px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2); width:200px; max-height:300px; overflow-y:auto;">
        <h3>Cooldown</h3>
        <div id="cooldowns"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="professor.js"></script>
</body>
</html>
