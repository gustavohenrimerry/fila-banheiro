<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Professor</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Botão de logout no canto */
    #logoutContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: sans-serif;
    }
    #logoutBtn {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
    }
    #logoutBtn:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <!-- LOGOUT E USUÁRIO -->
  <div id="logoutContainer" style="display:none;">
    <span id="usuarioLogado"></span>
    <button id="logoutBtn" onclick="logout()">Sair</button>
  </div>

  <!-- MENU COOLDOWN -->
  <div class="cooldownMenu">
    <button class="cooldownBotao" onclick="abrirCooldowns()">⏰</button>
    <div id="cooldownLista" class="cooldownLista" style="display:none;">
      <h3>Cooldown</h3>
      <div id="cooldowns"></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="loginContainer">
    <div class="loginBox">
      <h1>Painel Professor</h1>
      <input id="usuario" type="text" placeholder="Usuário" />
      <input id="senha" type="password" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- PAINEL -->
  <div id="painel" style="display:none;">
    <div class="topo">
      <h1>Controle Banheiro</h1>
      <div id="contador">0 alunos</div>
    </div>

    <!-- BOTÕES -->
    <div class="acoes">
      <button onclick="proximoAluno()">Avisar Aluno</button>
      <button onclick="alunoVoltou()">Aluno Voltou</button>
      <button onclick="abrirLista()">☰</button>
    </div>

    <!-- PRIMEIRO ALUNO -->
    <div id="primeiro"></div>

    <!-- FILA -->
    <div id="fila"></div>

    <!-- MENU ALUNOS -->
    <div id="menuAlunos" class="menuAlunos" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h2>Adicionar aluno</h2>
        <button onclick="fecharLista()" style="width:40px;height:40px;border:none;border-radius:50%;background:#5b3df5;color:white;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div id="listaAlunos"></div>
    </div>

    <!-- CONTADOR DE VEZES NO BANHEIRO -->
    <div class="contadorTitulo">
      <h2>Vezes no banheiro</h2>
    </div>
    <div id="contadorBanheiro"></div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="professor.js"></script>
</body>
</html>
